name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vision_dashboard_test
          POSTGRES_USER: vision
          POSTGRES_PASSWORD: vision
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vision -d vision_dashboard_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+psycopg://vision:vision@localhost:5432/vision_dashboard_test
      AUTH_REQUIRED: "true"
      ADMIN_API_KEYS: test-admin-key
      JWT_SECRET_KEY: test-jwt-secret-with-32-plus-characters
      FRONTEND_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run backend tests
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend tests
        run: npm run test
      - name: Build frontend
        run: npm run build

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install documentation dependencies
        run: python -m pip install -r docs/requirements.txt
      - name: Build documentation
        run: python -m mkdocs build --strict
