services:
  db:
    image: postgres:16-alpine
    container_name: vision-dashboard-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vision_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-vision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vision}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vision} -d ${POSTGRES_DB:-vision_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: vision-dashboard-backend
    env_file:
      - .env
    environment:
      FLASK_APP: wsgi.py
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_DEBUG: ${FLASK_DEBUG:-1}
      DATABASE_URL: postgresql+psycopg://$${POSTGRES_USER}:$${POSTGRES_PASSWORD}@db:5432/$${POSTGRES_DB}
      FRONTEND_ORIGIN: http://localhost:${FRONTEND_PORT:-5173}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "flask db upgrade &&
      flask seed &&
      flask run --host=0.0.0.0 --port=5000"

  frontend:
    build:
      context: ./frontend
    container_name: vision-dashboard-frontend
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api/v1}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  postgres_data:
  frontend_node_modules:
